<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piyush Ultra AI</title>
<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
transition:0.4s;
}
.dark{
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}
.container{
padding:20px;
}
.avatar img{
width:120px;
border-radius:50%;
}
#mood{
font-weight:bold;
margin:10px;
}
#chatbox{
height:260px;
overflow:auto;
background:white;
padding:10px;
border-radius:15px;
text-align:left;
}
.dark #chatbox{
background:#222;
color:white;
}
input,button{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}
button{
background:#ff4e8a;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h1>💖 Piyush Ultra AI Companion 🎀</h1>

<div class="avatar">
<img id="avatarImg" src="https://i.imgur.com/6VBx3io.png">
</div>

<div>Mood: <span id="mood">Happy</span></div>

<button onclick="toggleMode()">🌙 Toggle Mode</button>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Say something...">
<button onclick="sendMessage()">Send</button>

</div>

<script>
let mood = "Happy";
let userName = localStorage.getItem("aiUserName") || "";

function speak(text){
let speech = new SpeechSynthesisUtterance(text);
speech.rate = 1;
speech.pitch = 1.1;
speech.lang = "en-US";
speechSynthesis.speak(speech);
}

function sendMessage(){
let input = document.getElementById("userInput").value;
let chatbox = document.getElementById("chatbox");
let moodText = document.getElementById("mood");
let avatar = document.getElementById("avatarImg");

chatbox.innerHTML += "<p><b>You:</b> "+input+"</p>";

let reply = "You're awesome 😄";

if(input.toLowerCase().includes("my name is")){
userName = input.split("is")[1].trim();
localStorage.setItem("aiUserName", userName);
reply = "Nice to meet you " + userName + " 😊 I'll remember your name!";
}

else if(input.toLowerCase().includes("hi")){
reply = "Hii " + (userName || "Piyush") + " 😎";
}

else if(input.toLowerCase().includes("sad")){
reply = "Don't worry 💛 I'm here for you.";
mood = "Caring";
avatar.src="https://i.imgur.com/3XjYw6F.png";
}

else if(input.toLowerCase().includes("joke")){
reply = "Why was the computer cold? It forgot to close its Windows 😂";
avatar.src="https://i.imgur.com/6VBx3io.png";
}

else if(input.toLowerCase().includes("angry")){
reply = "Take a deep breath warrior 😌";
mood = "Calm";
avatar.src="https://i.imgur.com/3XjYw6F.png";
}

moodText.innerText = mood;

typingEffect(reply, chatbox);
speak(reply);
}

function typingEffect(text, chatbox){
let i = 0;
let botLine = document.createElement("p");
botLine.innerHTML = "<b>AI:</b> ";
chatbox.appendChild(botLine);

function type(){
if(i < text.length){
botLine.innerHTML += text.charAt(i);
i++;
setTimeout(type, 25);
}
}
type();
}

function toggleMode(){
document.body.classList.toggle("dark");
}
</script>

</body>
  </html>
